# NutriAssist — Oumi Training Config for Qwen2.5-1.5B (upgrade path)
# For when the 0.5B model quality is insufficient
# Target: Google Colab Free Tier (T4 GPU, 16GB VRAM) — tighter memory budget

model:
  model_name: "Qwen/Qwen2.5-1.5B-Instruct"
  torch_dtype_str: "bfloat16"
  trust_remote_code: true

data:
  train:
    datasets:
      - dataset_name: "text_sft"
        dataset_path: "/content/data/training_data.jsonl"
    collator_name: "text_causal_language_modeling"
    streaming: false

training:
  output_dir: "/content/nutriassist-model-1.5b"
  trainer_type: "TRL_SFT"
  num_train_epochs: 3
  per_device_train_batch_size: 2        # smaller batch for 1.5B
  gradient_accumulation_steps: 8        # keep effective batch = 16
  learning_rate: 1.5e-4                 # slightly lower for larger model
  warmup_steps: 50
  logging_steps: 10
  save_strategy: "epoch"
  lr_scheduler_type: "cosine"
  max_grad_norm: 0.3
  optim: "paged_adamw_8bit"
  fp16: false
  bf16: true
  use_peft: true
  max_seq_length: 512

peft:
  peft_method: "lora"
  lora_r: 8                             # lower rank to save VRAM
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  q_lora: true
  q_lora_bits: 4
